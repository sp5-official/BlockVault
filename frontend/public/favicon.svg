<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#grad)"/>

  <!-- Glow effect -->
  <circle cx="32" cy="32" r="22" fill="white" opacity="0.05"/>

  <!-- Lock Body -->
  <rect x="18" y="28" width="28" height="20" rx="6" fill="white"/>

  <!-- Lock Shackle -->
  <path d="M22 28v-6a10 10 0 0 1 20 0v6"
        fill="none"
        stroke="white"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="32" cy="38" r="3" fill="url(#grad)"/>
  <rect x="30.5" y="38" width="3" height="7" fill="url(#grad)"/>
</svg>